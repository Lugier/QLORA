name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Shell syntax checks
        run: |
          bash -n scripts/runpod_setup.sh
          bash -n scripts/runpod_preflight.sh
          bash -n scripts/runpod_train_full.sh
          bash -n scripts/runpod_deploy_and_train.sh
          bash -n scripts/local_prepare_and_smoke.sh

      - name: CLI drift check
        run: python3 scripts/validate_cli_drift.py

      - name: Unit tests
        run: |
          python3 -m unittest \
            tests.test_verification \
            tests.test_rewards \
            tests.test_prm_tiny \
            tests.test_scientific_gate
